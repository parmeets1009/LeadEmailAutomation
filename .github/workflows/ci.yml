name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          pip install -e .
          pip install pytest requests
      - name: Unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Backend E2E tests (self-skip without a running server)
        run: PYTHONPATH=src:backend python -m pytest backend/tests -q
